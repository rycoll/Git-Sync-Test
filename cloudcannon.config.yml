    bold: true
    bulletedlist: true
    center:
    code: true
    copyformatting: true
    embed: true
    expandable: true
    format:
    height:
    horizontalrule: true
    image: true
    image_size_attributes: true
    indent: true
    italic: true
    justify:
    left:
    link: true
    mime_type:
